<main class="min-h-screen flex items-center justify-center p-6 relative">

<div class="relative group">
<input class="w-full bg-surface-container-lowest border-outline-variant/20 rounded-lg px-4 py-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-300 outline-none" placeholder="nombre@arena.com" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 group-focus-within:text-primary transition-colors">alternate_email</span>
</div>
</div>

<a class="font-label text-[10px] uppercase tracking-wider text-primary hover:text-primary-fixed transition-colors" href="#">Olvidé mi contraseña</a>

<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 group-focus-within:text-primary transition-colors">lock</span>
</div>
</div>
